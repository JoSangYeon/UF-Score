########################################### data config ######################################################
dataset_conf:
  max_len: 10
  sample_rate: 16000
  batch_size: 40
  perturb: false
  shuffle: true
  shuffle_size: 2000
  num_workers: 8
########################################### data config ######################################################

teacher_conf:
  resnet:
    model_arch: "resnet50"
    model_link: "microsoft/resnet-50"
  vit:
    model_arch: "vit-large"
    model_link: "google/vit-large-patch16-224-in21k"

encoder_conf:
  encoder_architec: 'CED'
  encoder_strategy: "lora"  # "frozen", "trainable", "lora"

decoder_conf:
  hf_token: ""  # Set HUGGINGFACE_TOKEN environment variable
  gpt:
    model_arch: "gpt"
    model_link: "openai-community/gpt2-large"
  llama2:
    model_arch: "llama"
    model_link: "meta-llama/Llama-2-7b-hf"
  llama3:
    model_arch: "llama"
    model_link: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  decoder_strategy: "lora"  # "frozen", "trainable", "lora"

optim_args:
  lr: !!float 7.5e-5 # 5e-6
  name: "adamw_torch"
  weight_decay: !!float 1e-6

epochs: 30
warmup_radio: 0.13
acc_grad: 2
clip_grad: 1

